<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <!-- Background vert -->
  <circle cx="32" cy="32" r="32" fill="#67BD23"/>

  <!-- Capot + pare-brise (partie haute) -->
  <path d="M 18 28 Q 18 17 27 15 L 37 15 Q 46 17 46 28 Z" fill="#ffffff"/>
  <!-- Pare-brise teinté -->
  <path d="M 22 26 Q 25 19 29 18 L 35 18 Q 39 19 42 26 Z" fill="#0E1922" fill-opacity="0.55"/>

  <!-- Corps de la voiture (face avant) -->
  <path d="M 10 28 L 54 28 Q 56 28 56 30 L 56 44 Q 56 48 52 48 L 12 48 Q 8 48 8 44 L 8 30 Q 8 28 10 28 Z" fill="#ffffff"/>

  <!-- Phares LED swept (gauche) -->
  <path d="M 10 32 L 24 33 L 24 37 L 10 36 Z" fill="#0E1922"/>
  <!-- Phares LED swept (droite) -->
  <path d="M 40 33 L 54 32 L 54 36 L 40 37 Z" fill="#0E1922"/>
  <!-- Lueur LED (gauche) -->
  <rect x="12" y="33.5" width="10" height="1.2" rx="0.6" fill="#FEF3C7"/>
  <!-- Lueur LED (droite) -->
  <rect x="42" y="33.5" width="10" height="1.2" rx="0.6" fill="#FEF3C7"/>

  <!-- Calandre centrale (trapèze) -->
  <path d="M 26 39 L 38 39 L 40 44 L 24 44 Z" fill="#0E1922"/>
  <!-- Barres de calandre -->
  <line x1="25.5" y1="41" x2="38.5" y2="41" stroke="#67BD23" stroke-width="0.5" opacity="0.7"/>
  <line x1="26" y1="42.5" x2="38" y2="42.5" stroke="#67BD23" stroke-width="0.5" opacity="0.7"/>

  <!-- Feux antibrouillard bas -->
  <circle cx="14" cy="45" r="1.5" fill="#67BD23"/>
  <circle cx="50" cy="45" r="1.5" fill="#67BD23"/>
</svg>
