<!DOCTYPE html>
<html lang="{{ .Site.LanguageCode | default "fr" }}">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ with .Params.seoTitle }}{{ . }}{{ else }}{{ if $.IsHome }}{{ $.Site.Title }}{{ else }}{{ $.Title }} | {{ $.Site.Title }}{{ end }}{{ end }}</title>
    <meta name="description" content="{{ with .Description }}{{ . }}{{ else }}{{ .Site.Params.description }}{{ end }}">

    <!-- Favicon -->
    <link rel="icon" type="image/svg+xml" href="{{ "/favicon.svg" | relURL }}">
    <link rel="mask-icon" href="{{ "/favicon.svg" | relURL }}" color="#67BD23">
    <link rel="apple-touch-icon" href="{{ "/favicon.svg" | relURL }}">
    <meta name="theme-color" content="#67BD23">

    {{ partial "seo-head.html" . }}

    <!-- Google Fonts : DM Sans (style Carento) -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">

    {{ $css := resources.Get "css/main.css" }}
    {{ if $css }}
        <link rel="stylesheet" href="{{ $css.RelPermalink }}">
    {{ end }}
</head>
<body>
    {{ partial "header.html" . }}

    <main>
        {{ block "main" . }}{{ end }}
    </main>

    {{ partial "footer.html" . }}
</body>
</html>
